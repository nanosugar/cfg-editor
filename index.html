<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OMSI Sound Configuration Editor</title>
    <style>
        :root {
            --bg-main: #1a1a1a;
            --bg-card: #242424;
            --border-color: #333;
            --text-main: #e0e0e0;
            --text-muted: #aaa;
            --accent-green: #4caf50;
            --accent-blue: #2196f3;
            --accent-red: #f44336;
            --ui-blue: #2d5a88;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 20px;
            line-height: 1.4;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .block {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .block-header {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            color: var(--text-muted);
            font-size: 0.9em;
        }

        input[type="text"], select {
            width: 100%;
            padding: 8px;
            background-color: #111;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 4px;
            box-sizing: border-box;
        }

        .vector-icon {
            display: inline-flex;
            gap: 2px;
            font-family: monospace;
            font-weight: bold;
            font-size: 0.85em;
            background: #111;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #444;
        }
        .vector-x { color: var(--accent-red); }
        .vector-y { color: var(--accent-green); }
        .vector-z { color: var(--accent-blue); }

        .info-note {
            background-color: rgba(33, 150, 243, 0.1);
            border-left: 3px solid var(--accent-blue);
            padding: 8px 12px;
            font-size: 0.85em;
            color: #b3d4fc;
            margin-top: 8px;
            border-radius: 0 4px 4px 0;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- conditionSingle Block -->
    <div class="block" id="block-condition-single">
        <div class="block-header">
            <span>[conditionSingle] Block</span>
        </div>
        <div class="form-group">
            <label>Variable Name</label>
            <input type="text" placeholder="e.g., cp_schalter_bremse">
        </div>
        <div class="form-group">
            <label>Comparison Value</label>
            <input type="text" placeholder="e.g., 1">
        </div>
    </div>

    <!-- 3D Block -->
    <div class="block" id="block-3d">
        <div class="block-header">
            <span>[3D] Block</span>
            <div class="vector-icon">
                <span class="vector-x">X</span>
                <span class="vector-y">Y</span>
                <span class="vector-z">Z</span>
            </div>
        </div>
        <div class="form-group">
            <label>X Coordinate (Left/Right)</label>
            <input type="text" placeholder="0.0">
        </div>
        <div class="form-group">
            <label>Y Coordinate (Front/Back)</label>
            <input type="text" placeholder="0.0">
        </div>
        <div class="form-group">
            <label>Z Coordinate (Height)</label>
            <input type="text" placeholder="0.0">
        </div>
        <div class="form-group">
            <label>Full Volume Radius</label>
            <input type="text" placeholder="e.g., 10">
        </div>
    </div>

    <!-- loopsound Block -->
    <div class="block" id="block-loopsound">
        <div class="block-header">
            <span>[loopsound] Block</span>
        </div>
        <div class="form-group">
            <label>Audio File Path</label>
            <input type="text" placeholder="e.g., engine_idle.wav">
        </div>
        
        <!-- NoLoop Tag Configuration (Valid only for loopsound) -->
        <div class="form-group">
            <label>Add a [noloop] tag?</label>
            <select id="noloop-select">
                <option value="no">No</option>
                <option value="yes">Yes</option>
            </select>
        </div>
    </div>

    <!-- volcurve Block -->
    <div class="block" id="block-volcurve">
        <div class="block-header">
            <span>[volcurve] Block</span>
        </div>
        <div class="form-group">
            <label>Control Variable</label>
            <input type="text" placeholder="e.g., engine_rpm">
        </div>
        <div class="info-note">
            <strong>Note:</strong> Setting the control variable to -1 serves as a fade-in configuration for the [loopsound].
        </div>
    </div>

</div>

</body>
</html>
