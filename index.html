<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMSI Sound Config Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.31/dist/vue.global.prod.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 p-6">

    <div id="app" class="w-full max-w-none text-left">
        <header class="mb-6 flex justify-between items-center border-b border-slate-200 pb-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-slate-800">OMSI Sound Config Editor</h1>
                <p class="text-sm text-slate-500">Left-justified block list with horizontal entry layouts.</p>
            </div>
            
            <button v-if="blocks.length > 0" @click="exportFile" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-4 rounded shadow-sm text-sm transition">
                Export File
            </button>
        </header>

        <!-- Controls File Upload & Mass Edit -->
        <div class="bg-white p-4 rounded-lg border border-slate-200 shadow-xs mb-6 flex gap-4 items-center justify-start flex-wrap">
            <input type="file" @change="handleFileUpload" class="text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">

            <div v-if="blocks.length > 0" class="flex items-center gap-2">
                <input v-model="findText" type="text" placeholder="Find entry text..." class="border border-slate-300 rounded px-2 py-1 text-sm bg-white">
                <input v-model="replaceText" type="text" placeholder="Replace with..." class="border border-slate-300 rounded px-2 py-1 text-sm bg-white">
                <button @click="massReplace" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-1 px-3 rounded transition">
                    Mass Replace
                </button>
            </div>
        </div>

        <!-- Left-Justified Draggable Workspace -->
        <div 
            class="space-y-2 w-full text-left"
            @dragover.prevent
            @drop="handleDrop"
        >
            <div v-if="blocks.length === 0" class="py-12 border-2 border-dashed border-slate-200 rounded-lg bg-white text-center">
                <p class="text-slate-400 italic">Select an OMSI sound configuration file above to begin.</p>
            </div>

            <!-- Block Cards -->
            <div 
                v-for="(block, index) in blocks" 
                :key="block.id"
                draggable="true"
                @dragstart="handleDragStart(index)"
                @dragenter="handleDragEnter(index)"
                class="bg-white rounded border shadow-xs p-3 flex gap-3 items-center transition duration-150 group text-left w-full"
                :class="block.type === 'loopsound' ? 'border-l-4 border-l-emerald-500 border-slate-200' : 'border-l-4 border-l-blue-500 border-slate-200'"
            >
                <!-- Drag Handle Icon -->
                <div class="text-slate-300 group-hover:text-slate-400 cursor-grab active:cursor-grabbing select-none font-bold px-1">
                    ☰
                </div>

                <!-- Block Header Tag -->
                <div class="font-mono text-xs font-bold uppercase tracking-wider px-2 py-1 rounded bg-slate-100 min-w-[90px] text-center border border-slate-200">
                    [{{ block.type }}]
                </div>

                <!-- Horizontal Entry List -->
                <div class="flex flex-wrap gap-1.5 items-center flex-1 font-mono text-sm text-slate-700 overflow-x-auto py-1">
                    <span 
                        v-for="(line, lIdx) in block.entries" 
                        :key="lIdx"
                        class="px-2 py-0.5 rounded text-xs bg-slate-50 border border-slate-200 whitespace-nowrap"
                        :class="line.startsWith('[') ? 'font-bold text-blue-700 bg-blue-50/50 border-blue-100' : 'text-slate-600'"
                    >
                        {{ line }}
                    </span>
                </div>
                
                <!-- Quick Actions -->
                <div class="flex items-center gap-3 opacity-0 group-hover:opacity-100 transition-opacity ml-auto pr-2">
                    <button @click="duplicateBlock(index)" class="text-xs text-blue-600 hover:underline">Duplicate</button>
                    <button @click="deleteBlock(index)" class="text-xs text-rose-600 hover:underline">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const blocks = ref([]);
                const findText = ref('');
                const replaceText = ref('');
                let draggedIndex = null;

                const handleFileUpload = (event) => {
                    const file = event.target.files[0];
                    if (!file) return;

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const rawText = e.target.result;
                        const blockRegex = /(?=\[(?:sound|loopsound)\])/i;
                        const rawBlocks = rawText.split(blockRegex);
                        
                        blocks.value = rawBlocks
                            .map((blockContent, idx) => {
                                const trimmed = blockContent.trim();
                                if (!trimmed) return null;
                                
                                const lines = trimmed.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                                const header = lines[0].toLowerCase();
                                // Store interior lines as an array for horizontal loop rendering
                                const entries = lines.slice(1);
                                
                                return {
                                    id: `b-${idx}-${Date.now()}-${Math.random()}`,
                                    type: header.includes('loopsound') ? 'loopsound' : 'sound',
                                    entries: entries
                                };
                            })
                            .filter(b => b !== null);
                    };
                    reader.readAsText(file);
                };

                const handleDragStart = (index) => { draggedIndex = index; };
                const handleDragEnter = (index) => {
                    if (draggedIndex === null || draggedIndex === index) return;
                    const targetItem = blocks.value[draggedIndex];
                    blocks.value.splice(draggedIndex, 1);
                    blocks.value.splice(index, 0, targetItem);
                    draggedIndex = index;
                };
                const handleDrop = () => { draggedIndex = null; };

                const duplicateBlock = (index) => {
                    const clone = JSON.parse(JSON.stringify(blocks.value[index]));
                    clone.id = `b-clone-${Date.now()}-${Math.random()}`;
                    blocks.value.splice(index + 1, 0, clone);
                };

                const deleteBlock = (index) => { blocks.value.splice(index, 1); };

                const massReplace = () => {
                    if (!findText.value) return;
                    blocks.value.forEach(block => {
                        block.entries = block.entries.map(entry => 
                            entry.replaceAll(findText.value, replaceText.value)
                        );
                    });
                    alert(`Mass replacement complete.`);
                };

                const exportFile = () => {
                    const outputText = blocks.value.map(block => {
                        const header = block.type === 'loopsound' ? '[loopsound]' : '[sound]';
                        return `${header}\n${block.entries.join('\n')}`;
                    }).join('\n\n');

                    const blob = new Blob([outputText], { type: 'text/plain;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = 'sound_edited.cfg';
                    link.click();
                    URL.revokeObjectURL(url);
                };

                return {
                    blocks,
                    findText,
                    replaceText,
                    handleFileUpload,
                    handleDragStart,
                    handleDragEnter,
                    handleDrop,
                    duplicateBlock,
                    deleteBlock,
                    massReplace,
                    exportFile
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
