<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMSI Sound Config Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.31/dist/vue.global.prod.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 p-6">

    <div id="app" class="w-full max-w-none text-left">
        <header class="mb-6 flex justify-between items-center border-b border-slate-200 pb-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-slate-800">OMSI Sound Config Editor</h1>
            </div>
            
            <button v-if="blocks.length > 0" @click="exportFile" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-4 rounded shadow-sm text-sm transition">
                Export File
            </button>
        </header>

        <!-- Drag & Drop File Upload + Mass Edit Panel -->
        <div 
            @dragover.prevent="isDraggingFile = true"
            @dragleave="isDraggingFile = false"
            @drop.prevent="handleFileDrop"
            class="p-4 rounded-lg border shadow-xs mb-6 flex gap-4 items-center justify-start flex-wrap transition duration-200"
            :class="isDraggingFile ? 'border-blue-500 bg-blue-50/50' : 'bg-white border-slate-200'"
        >
            <div class="flex items-center gap-3">
                <input type="file" @change="handleFileUpload" class="text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                <span class="text-xs text-slate-400 font-medium hidden sm:inline">or drop .cfg file directly here</span>
            </div>

            <div v-if="blocks.length > 0" class="flex items-center gap-2 border-l border-slate-200 pl-4 ml-2">
                <input v-model="findText" type="text" placeholder="Find entry text..." class="border border-slate-300 rounded px-2 py-1 text-sm bg-white">
                <input v-model="replaceText" type="text" placeholder="Replace with..." class="border border-slate-300 rounded px-2 py-1 text-sm bg-white">
                <button @click="massReplace" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-1 px-3 rounded transition">
                    Mass Replace
                </button>
            </div>
        </div>

        <!-- Left-Justified Draggable Workspace -->
        <div class="space-y-4 flex flex-col items-start w-full text-left" @dragover.prevent @drop="handleDrop">
            <!-- Block Cards -->
            <div 
                v-for="(block, index) in blocks" 
                :key="block.id"
                :draggable="block.isDraggable"
                @dragstart="handleDragStart(index)"
                @dragenter="handleDragEnter(index)"
                class="bg-white rounded border shadow-xs p-4 flex gap-4 items-start transition duration-150 group text-left w-full max-w-5xl"
                :class="{
                    'border-l-[16px] border-l-emerald-500 border-slate-200': block.type === 'loopsound',
                    'border-l-[16px] border-l-blue-500 border-slate-200': block.type === 'sound',
                    'border-l-[16px] border-l-red-800 border-slate-200': block.type === 'rawtext'
                }"
            >
                <!-- Drag Handle -->
                <div class="flex flex-col items-center gap-2 mt-1 mr-1">
                    <button v-if="block.type !== 'rawtext'" @click="block.collapsed = !block.collapsed" class="text-slate-500 hover:text-slate-800 text-xs">
                        {{ block.collapsed ? '▶' : '▼' }}
                    </button>
                    <div 
                        @mouseenter="block.isDraggable = true"
                        @mouseleave="block.isDraggable = false"
                        class="text-slate-300 hover:text-slate-500 cursor-grab active:cursor-grabbing select-none font-bold text-lg px-1"
                        :class="{'mt-2': block.type === 'rawtext'}"
                    >
                        ☰
                    </div>
                </div>

                <div class="flex-1 font-mono text-sm min-w-0 w-full">
                    
                    <!-- RAW TEXT BLOCK TEMPLATE -->
                    <template v-if="block.type === 'rawtext'">
                        <div class="flex flex-col gap-1.5 w-full pr-2 pt-1">
                            <span class="text-xs font-bold text-red-800/60 uppercase tracking-wider">Unrelated Text / Comments</span>
                            <textarea 
                                v-model="block.content" 
                                class="w-full bg-slate-50 border border-slate-200 rounded p-2 text-slate-700 min-h-[100px] focus:outline-none focus:border-red-400 font-mono text-sm resize-y"
                            ></textarea>
                        </div>
                    </template>

                    <!-- SOUND / LOOPSOUND TEMPLATE -->
                    <template v-else>
                        <div class="flex flex-col gap-4 w-full">
                            <!-- Top Row: Filename & Viewpoint -->
                            <div class="flex gap-6 items-start flex-wrap w-full">
                                <div class="bg-slate-50 px-2 py-1 rounded border flex-1 min-w-[300px]">
                                    <input 
                                        v-model="block.filename" 
                                        class="font-bold bg-transparent outline-none w-full placeholder:text-slate-400 placeholder:italic placeholder:font-normal" 
                                        placeholder="Filename set by T.F. function in a script"
                                    >
                                </div>
                                
                                <div v-if="!block.collapsed" class="flex items-center gap-2 text-xs bg-slate-100 border border-slate-200 rounded px-2 py-1 w-fit">
                                    <span class="font-bold text-slate-500 uppercase tracking-tight">[viewpoint]</span>
                                    <select v-model="block.viewpoint" class="bg-white border border-slate-300 rounded px-1.5 py-0.5 text-slate-700 focus:outline-none font-sans font-medium">
                                        <option value="2">Inside (2)</option>
                                        <option value="1">Outside (1)</option>
                                        <option value="5">Outside + AI (5)</option>
                                    </select>
                                </div>
                            </div>
                    
                            <!-- Bottom Row: 3D Spatial Properties (Below Filename) -->
                            <div v-if="!block.collapsed" class="flex flex-col gap-1 text-xs bg-slate-100 border border-slate-200 rounded p-2 w-fit">
                                <div class="font-bold text-slate-500 uppercase tracking-tight border-b border-slate-200 pb-0.5 mb-1 flex items-center gap-2">
                                    <span>[3d]</span>
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round">
                                        <line x1="12" y1="12" x2="12" y2="4" stroke="#16a34a"/>
                                        <line x1="12" y1="12" x2="20" y2="12" stroke="#dc2626"/>
                                        <line x1="12" y1="12" x2="6" y2="18" stroke="#2563eb"/>
                                        <circle cx="12" cy="12" r="1.5" fill="#334155" stroke="none"/>
                                    </svg>
                                </div>
                                <div class="flex flex-col mt-1">
                                    <label class="text-slate-400 font-bold mb-1">X / Y / Z / Fade:</label>
                                    <textarea 
                                        v-model="block.spatial3d" 
                                        placeholder="0 0 0 0" 
                                        rows="4"
                                        class="border border-slate-300 rounded px-2 py-1 w-48 bg-white text-slate-800 font-mono tracking-widest resize-none whitespace-pre">
                                    </textarea>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Rest of properties (only show when expanded) -->
                        <div v-if="!block.collapsed" class="space-y-4 mt-5 pt-3 border-t border-slate-100">
                                
                            <!-- Interactive Base Editable Fields Stack -->
                            <div class="text-xs text-slate-600 space-y-2 pl-2 border-l-2 border-slate-200 max-w-xl">
                                <template v-if="block.type === 'sound'">
                                    <div class="flex items-center gap-2">
                                        <span class="font-bold text-slate-400 w-24">Volume:</span> 
                                        <input v-model="block.volume" type="text" class="border border-slate-300 rounded px-2 py-0.5 w-48 bg-white text-slate-800 focus:outline-none focus:border-blue-400">
                                    </div>
                                </template>
        
                                <template v-else-if="block.type === 'loopsound'">
                                    <div class="flex items-center gap-2">
                                        <span class="font-bold text-slate-400 w-24">Sample Rate:</span>
                                        <select v-model="block.sampleRate" class="border border-slate-300 rounded px-1.5 py-0.5 bg-white text-slate-800 focus:outline-none focus:border-blue-400">
                                            <option value="44100">44100</option>
                                            <option value="48000">48000</option>
                                        </select>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <span class="font-bold text-slate-400 w-24">Variable:</span> 
                                        <input v-model="block.loopVariable" type="text" class="border border-slate-300 rounded px-2 py-0.5 w-64 bg-white text-slate-800 focus:outline-none focus:border-blue-400">
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <span class="font-bold text-slate-400 w-24">Variable Value:</span> 
                                        <input v-model="block.varValue" type="text" class="border border-slate-300 rounded px-2 py-0.5 w-48 bg-white text-slate-800 focus:outline-none focus:border-blue-400">
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <span class="font-bold text-slate-400 w-24">Volume:</span> 
                                        <input v-model="block.volume" type="text" class="border border-slate-300 rounded px-2 py-0.5 w-48 bg-white text-slate-800 focus:outline-none focus:border-blue-400">
                                    </div>
        
                                    <div class="pt-2 mt-2 border-t border-dashed border-slate-200">
                                        <div class="flex items-center gap-2">
                                            <span class="font-bold text-slate-500 w-32">Add a [noloop] tag?</span>
                                            <select v-model="block.noloop" class="border border-slate-300 rounded px-1.5 py-0.5 bg-white text-slate-800">
                                                <option value="no">No</option>
                                                <option value="yes">Yes</option>
                                            </select>
                                            <span class="font-bold text-slate-500 w-32">If yes, sound will play only once when conditions are met.</span>
                                        </div>
                                    </div>
                                </template>
                            </div>
        
                            <!-- Mutually Exclusive Trigger Block for [sound] -->
                            <template v-if="block.type === 'sound'">
                                <div class="text-xs space-y-2 pl-2 border-l-2 border-amber-300 max-w-2xl bg-amber-50/40 p-2 rounded mt-4 transition-opacity" :class="{'opacity-50': block.conditions.length > 0}">
                                    <div class="font-bold text-slate-600 flex items-center justify-between">
                                        <span>[trigger]</span>
                                        <button v-if="!block.trigger" @click="block.trigger = 'new_trigger'" :disabled="block.conditions.length > 0" class="text-[10px] bg-slate-200 hover:bg-slate-300 px-2 py-0.5 rounded text-slate-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
                                            + Add Trigger
                                        </button>
                                    </div>
                                    
                                    <div v-if="!block.trigger" class="text-slate-400 italic text-[11px]">
                                        No trigger attached.
                                    </div>
                                    <div v-else class="flex flex-wrap items-center gap-2 bg-white border border-slate-200 rounded p-1.5 shadow-2xs relative">
                                        <div class="flex items-center gap-1">
                                            <span class="text-slate-400 font-semibold">Trigger Event:</span>
                                            <input v-model="block.trigger" type="text" :disabled="block.conditions.length > 0" class="border border-slate-300 rounded px-1.5 py-0.5 w-64 font-mono bg-white text-slate-800 disabled:bg-slate-50 disabled:text-slate-500 focus:outline-none focus:border-blue-400">
                                        </div>
                                        <button @click="block.trigger = ''" class="text-rose-500 font-bold hover:text-rose-700 pl-1 text-[11px]">×</button>
                                    </div>
                                    <div v-if="block.conditions.length > 0" class="text-rose-500 font-semibold text-[10px] mt-1">
                                        Disabled: A sound cannot have both a trigger and conditions.
                                    </div>
                                </div>
                            </template>
        
                            <!-- Vertical Stack for Multiple conditionSingle Config Entries -->
                            <div class="text-xs space-y-2 pl-2 border-l-2 border-amber-300 max-w-2xl bg-amber-50/40 p-2 rounded mt-4 transition-opacity" :class="{'opacity-50': block.type === 'sound' && !!block.trigger}">
                                <div class="font-bold text-slate-600 flex items-center justify-between">
                                    <span>[conditionSingle]</span>
                                    <button @click="addCondition(block)" :disabled="block.type === 'sound' && !!block.trigger" class="text-[10px] bg-slate-200 hover:bg-slate-300 px-2 py-0.5 rounded text-slate-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
                                        + Add Condition
                                    </button>
                                </div>
                                <div v-if="block.conditions.length === 0" class="text-slate-400 italic text-[11px]">
                                    No conditional requirements set, sound will play constantly.
                                </div>
                                <div v-for="(cond, cIdx) in block.conditions" :key="cIdx" class="flex flex-wrap items-center gap-2 bg-white border border-slate-200 rounded p-1.5 shadow-2xs relative">
                                    <div class="flex items-center gap-1">
                                        <span class="text-slate-400 font-semibold">Variable Name:</span>
                                        <input v-model="cond.varName" type="text" :disabled="block.type === 'sound' && !!block.trigger" class="border border-slate-300 rounded px-1.5 py-0.5 w-40 font-mono bg-white text-slate-800 disabled:bg-slate-50 disabled:text-slate-500">
                                    </div>
                                    <div class="flex items-center gap-1">
                                        <span class="text-slate-400 font-semibold">Value:</span>
                                        <input v-model="cond.varVal" type="text" :disabled="block.type === 'sound' && !!block.trigger" class="border border-slate-300 rounded px-1.5 py-0.5 w-20 font-mono bg-white text-slate-800 disabled:bg-slate-50 disabled:text-slate-500">
                                    </div>
                                    <div class="flex items-center gap-1">
                                        <span class="text-slate-400 font-semibold">Condition:</span>
                                        <select v-model="cond.conditionType" :disabled="block.type === 'sound' && !!block.trigger" class="border border-slate-300 rounded px-1 py-0.5 font-sans bg-white text-slate-800 disabled:bg-slate-50 disabled:text-slate-500">
                                            <option value="1">1 : = Equal to above value</option>
                                            <option value="2">2 : &lt; Less than above value</option>
                                            <option value="3">3 : &gt; Greater than above value</option>
                                            <option value="4">4 : &lt;= Less than or equal to above value</option>
                                            <option value="5">5 : &gt;= Greater than or equal to above value</option>
                                        </select>
                                    </div>
                                    <button @click="removeCondition(block, cIdx)" class="text-rose-500 font-bold hover:text-rose-700 pl-1 text-[11px]">×</button>
                                </div>
                                <div v-if="block.type === 'sound' && !!block.trigger" class="text-rose-500 font-semibold text-[10px] mt-1">
                                    Disabled: A sound cannot have both a trigger and conditions.
                                </div>
                            </div>
        
                            <!-- Fully Scaled Volcurve Viewport Area -->
                            <div v-if="block.curves && block.curves.length > 0" class="pt-2 space-y-4 border-t border-slate-100">
                                <div v-for="(curve, cIdx) in block.curves" :key="cIdx" class="bg-slate-50 p-3 rounded border border-slate-200 inline-block min-w-[320px] max-w-full">
                                    <div class="text-xs font-bold text-slate-500 mb-1">
                                        [volcurve] &rarr; <span class="text-blue-700">{{ curve.variable }}</span>
                                    </div>
                                    
                                    <!-- Only show this if the variable is specifically -1 -->
                                    <div v-if="curve.variable === '-1'" class="text-slate-400 italic text-[11px] mb-2">
                                        A [volcurve] with a variable of -1 means a fade in for the loopsound.
                                    </div>
                                    <svg class="bg-white border border-slate-300 rounded" width="300" height="120" viewBox="0 0 300 120">
                                        <line x1="0" y1="30" x2="300" y2="30" stroke="#cbd5e1" stroke-width="1" />
                                        <line x1="0" y1="60" x2="300" y2="60" stroke="#cbd5e1" stroke-width="1" />
                                        <line x1="0" y1="90" x2="300" y2="90" stroke="#cbd5e1" stroke-width="1" />
                                        
                                        <line x1="75" y1="0" x2="75" y2="120" stroke="#f1f5f9" stroke-width="1" />
                                        <line x1="150" y1="0" x2="150" y2="120" stroke="#cbd5e1" stroke-width="1" />
                                        <line x1="225" y1="0" x2="225" y2="120" stroke="#f1f5f9" stroke-width="1" />
        
                                        <path 
                                            :d="getSvgPath(curve.points)" 
                                            fill="none" 
                                            stroke="#2563eb" 
                                            stroke-width="2" 
                                            stroke-linecap="round" 
                                            stroke-linejoin="round"
                                        />
                                        
                                        <circle 
                                            v-for="(pnt, pIdx) in getVisualPoints(curve.points)" 
                                            :key="pIdx"
                                            :cx="pnt.x" 
                                            :cy="pnt.y" 
                                            r="4" 
                                            fill="#1d4ed8"
                                            stroke="#ffffff"
                                            stroke-width="1.5"
                                        />
                                    </svg>
                                    
                                    <!-- Vertically Stacked Curve Points Edit UI -->
                                    <div class="flex gap-2 mt-3 overflow-x-auto text-[10px] text-slate-500 pb-2">
                                        <div v-for="(p, pIdx) in curve.points" :key="pIdx" class="flex flex-col items-center gap-1 bg-white border border-slate-200 p-1.5 rounded shadow-sm relative group/pnt">
                                            <div class="flex items-center gap-1 justify-between w-full">
                                                <span class="font-bold text-slate-400">X:</span>
                                                <input v-model.number="p.x" class="w-12 bg-slate-50 border border-slate-200 rounded text-center font-bold px-1 py-0.5 focus:outline-none focus:border-blue-400">
                                            </div>
                                            <div class="flex items-center gap-1 justify-between w-full">
                                                <span class="font-bold text-slate-400">Y:</span>
                                                <input v-model.number="p.y" class="w-12 bg-slate-50 border border-slate-200 rounded text-center font-bold px-1 py-0.5 focus:outline-none focus:border-blue-400">
                                            </div>
                                            <button @click="removeCurvePoint(curve, pIdx)" class="absolute -top-2 -right-2 bg-rose-500 text-white rounded-full w-4 h-4 flex items-center justify-center text-[10px] hover:bg-rose-600 shadow opacity-0 group-hover/pnt:opacity-100 transition">×</button>
                                        </div>
                                        <button @click="addCurvePoint(curve)" class="bg-slate-100 hover:bg-slate-200 border border-slate-300 text-slate-600 px-3 rounded flex items-center justify-center font-bold transition">+</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
                
                <!-- Quick Actions -->
                <div class="flex flex-col items-center gap-3 opacity-0 group-hover:opacity-100 transition-opacity ml-auto pl-4">
                    <button @click="duplicateBlock(index)" class="text-xs text-blue-600 hover:underline">Duplicate</button>
                    <button @click="deleteBlock(index)" class="text-xs text-rose-600 hover:underline">Delete</button>
                </div>
            </div>
        </div>

        <button
            v-if="blocks.length && blocks.some(b => b.type !== 'rawtext')"
            @click="toggleAllCollapsed"
            class="fixed bottom-6 right-6 w-14 h-14 rounded-full bg-blue-600 hover:bg-blue-700 text-white shadow-xl text-xl transition z-50 flex items-center justify-center"
            :title="isAllCollapsed ? 'Expand all' : 'Collapse all'">
            {{ isAllCollapsed ? '⤢' : '⤡' }}
        </button>
    </div>

    <script>
        const { createApp, ref, computed } = Vue;

        createApp({
            setup() {
                const blocks = ref([]);
                const findText = ref('');
                const replaceText = ref('');
                const isDraggingFile = ref(false);
                let draggedIndex = null;
                
                const isAllCollapsed = computed(() => {
                    const soundBlocks = blocks.value.filter(b => b.type !== 'rawtext');
                    if (soundBlocks.length === 0) return true;
                    return soundBlocks.every(b => b.collapsed);
                });

                const processRawText = async (rawText) => {
                    const lines = rawText.split(/\r?\n/);
                    blocks.value = [];
                    let i = 0;
                    let currentRawText = [];
                    let hasProcessedABlock = false;
                
                    const flushRawText = () => {
                        if (!hasProcessedABlock) {
                            currentRawText = [];
                            return;
                        }
                        while(currentRawText.length && currentRawText[currentRawText.length - 1].trim() === '') currentRawText.pop();
                        while(currentRawText.length && currentRawText[0].trim() === '') currentRawText.shift();
                        
                        if (currentRawText.length > 0) {
                            blocks.value.push({
                                id: 'raw-' + Date.now() + '-' + Math.random(),
                                type: 'rawtext',
                                content: currentRawText.join('\n'),
                                collapsed: false,
                                isDraggable: false
                            });
                            currentRawText = [];
                        }
                    };
                
                    // Use a helper to process lines in chunks
                    const processChunk = () => {
                        const startTime = performance.now();
                        
                        // Process up to 500 lines or for 10ms before yielding
                        while (i < lines.length && (performance.now() - startTime < 10)) {
                            let lineStr = lines[i];
                            let lowerLine = lineStr.trim().toLowerCase();
                
                            if (lowerLine === '[sound]' || lowerLine === '[loopsound]') {
                                flushRawText();
                                hasProcessedABlock = true;
                
                                const isLoop = lowerLine === '[loopsound]';
                                let block = {
                                    id: `b-${Date.now()}-${Math.random()}`,
                                    type: isLoop ? 'loopsound' : 'sound',
                                    filename: (lines[i+1] || '').trim(),
                                    collapsed: true,
                                    isDraggable: false,
                                    sampleRate: isLoop ? (lines[i+2] || '44100').trim() : '44100',
                                    loopVariable: isLoop ? (lines[i+3] || '').trim() : '',
                                    varValue: isLoop ? (lines[i+4] || '').trim() : '',
                                    volume: isLoop ? (lines[i+5] || '').trim() : (lines[i+2] || '').trim(),
                                    viewpoint: '2',
                                    trigger: '',
                                    noloop: 'no',
                                    spatial3d: "0 0 0 0",
                                    conditions: [],
                                    curves: []
                                };
                
                                i += isLoop ? 6 : 3;
                                let j = i;
                                let currentCurve = null;
                
                                while (j < lines.length) {
                                    let rawLine = lines[j] || '';
                                    let cmdLine = rawLine.trim();
                                    let cmdLower = cmdLine.toLowerCase();
                
                                    if (j > i && (cmdLower === '[sound]' || cmdLower === '[loopsound]')) break;
                                    
                                    if (cmdLine === '' || cmdLine.startsWith('//') || cmdLine.startsWith(';')) {
                                        j++; continue;
                                    }
                
                                    if (cmdLower === '[viewpoint]') { block.viewpoint = (lines[j+1] || '2').trim(); j += 2; }
                                    else if (cmdLower === '[3d]') {
                                        block.spatial3d = `${(lines[j+1]||'0').trim()}\n${(lines[j+2]||'0').trim()}\n${(lines[j+3]||'0').trim()}\n${(lines[j+4]||'0').trim()}`;
                                        j += 5;
                                    } else if (cmdLower === '[trigger]') { block.trigger = (lines[j+1] || '').trim(); j += 2; }
                                    else if (cmdLower === '[noloop]') { block.noloop = 'yes'; j += 1; }
                                    else if (cmdLower === '[conditionsingle]') {
                                        block.conditions.push({ varName: (lines[j+1]||'').trim(), varVal: (lines[j+2]||'').trim(), conditionType: (lines[j+3]||'1').trim() });
                                        j += 4;
                                    } else if (cmdLower === '[volcurve]') {
                                        currentCurve = { variable: (lines[j+1] || 'unknown').trim(), points: [] };
                                        block.curves.push(currentCurve);
                                        j += 2;
                                    } else if (cmdLower === '[pnt]') {
                                        if (currentCurve) { currentCurve.points.push({ x: parseFloat((lines[j+1]||'0').trim()), y: parseFloat((lines[j+2]||'0').trim()) }); j += 3; }
                                        else { j++; }
                                    } else { j++; }
                                }
                                blocks.value.push(block);
                                i = j;
                            } else {
                                if (lineStr.trim() !== '') currentRawText.push(lineStr);
                                i++;
                            }
                        }
                
                        if (i < lines.length) {
                            setTimeout(processChunk, 0); // Yield to browser
                        } else {
                            flushRawText();
                        }
                    };
                
                    processChunk();
                };

                const getVisualPoints = (points) => {
                    if (!points || points.length === 0) return [];
                    const width = 300;
                    const height = 120;
                    const padding = 12;
                    
                    const xValues = points.map(p => p.x);
                    const yValues = points.map(p => p.y);
                    
                    const minX = Math.min(...xValues);
                    const maxX = Math.max(...xValues);
                    const minY = Math.min(...yValues, 0); 
                    const maxY = Math.max(...yValues);

                    return points.map(p => {
                        const pctX = (maxX - minX === 0) ? 0.5 : (p.x - minX) / (maxX - minX);
                        const pctY = (maxY - minY === 0) ? 0.5 : (p.y - minY) / (maxY - minY);
                        return {
                            x: padding + pctX * (width - padding * 2),
                            y: (height - padding) - pctY * (height - padding * 2)
                        };
                    });
                };

                const getSvgPath = (points) => {
                    const vPoints = getVisualPoints(points);
                    if (vPoints.length === 0) return '';
                    return vPoints.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
                };

                const handleFileUpload = (event) => {
                    const file = event.target.files[0];
                    if (!file) return;
                    readFile(file);
                };

                const handleFileDrop = (event) => {
                    isDraggingFile.value = false;
                    const file = event.dataTransfer.files[0];
                    if (!file) return;
                    readFile(file);
                };

                const readFile = (file) => {
                    const reader = new FileReader();
                    reader.onload = (e) => processRawText(e.target.result);
                    reader.readAsText(file);
                };

                const handleDragStart = (index) => { draggedIndex = index; };
                const handleDragEnter = (index) => {
                    if (draggedIndex === null || draggedIndex === index) return;
                    const targetItem = blocks.value[draggedIndex];
                    blocks.value.splice(draggedIndex, 1);
                    blocks.value.splice(index, 0, targetItem);
                    draggedIndex = index;
                };
                const handleDrop = () => { draggedIndex = null; };

                const duplicateBlock = (index) => {
                    const clone = JSON.parse(JSON.stringify(blocks.value[index]));
                    clone.id = `b-clone-${Date.now()}-${Math.random()}`;
                    blocks.value.splice(index + 1, 0, clone);
                };

                const deleteBlock = (index) => { blocks.value.splice(index, 1); };

                const addCondition = (block) => {
                    block.conditions.push({ varName: '', varVal: '', conditionType: '1' });
                };

                const removeCondition = (block, cIdx) => {
                    block.conditions.splice(cIdx, 1);
                };

                const addCurvePoint = (curve) => { curve.points.push({ x: 0, y: 0 }); };
                const removeCurvePoint = (curve, index) => { curve.points.splice(index, 1); };

                const toggleAllCollapsed = () => {
                    const shouldExpand = isAllCollapsed.value;
                    blocks.value.forEach(block => {
                        if (block.type !== 'rawtext') {
                            block.collapsed = !shouldExpand;
                        }
                    });
                };

                const massReplace = () => {
                    if (!findText.value) return;
                    blocks.value.forEach(block => {
                        if (block.type === 'rawtext') {
                            block.content = block.content.replaceAll(findText.value, replaceText.value);
                            return;
                        }

                        if (block.filename) block.filename = block.filename.replaceAll(findText.value, replaceText.value);
                        if (block.loopVariable) block.loopVariable = block.loopVariable.replaceAll(findText.value, replaceText.value);
                        if (block.varValue) block.varValue = block.varValue.replaceAll(findText.value, replaceText.value);
                        if (block.volume) block.volume = block.volume.replaceAll(findText.value, replaceText.value);
                        if (block.type === 'sound' && block.trigger) block.trigger = block.trigger.replaceAll(findText.value, replaceText.value);
                        
                        block.conditions.forEach(c => {
                            c.varName = c.varName.replaceAll(findText.value, replaceText.value);
                            c.varVal = c.varVal.replaceAll(findText.value, replaceText.value);
                        });
                        
                        if (block.curves) {
                            block.curves.forEach(c => {
                                c.variable = c.variable.replaceAll(findText.value, replaceText.value);
                            });
                        }
                        
                        if (block.spatial3d) {
                            block.spatial3d = block.spatial3d.replaceAll(findText.value, replaceText.value);
                        }
                    });
                    alert(`Mass replacement complete.`);
                };

                const exportFile = () => {
                    const outputText = blocks.value.map(block => {
                        if (block.type === 'rawtext') {
                            return block.content;
                        }

                        const header = block.type === 'loopsound' ? '[loopsound]' : '[sound]';
                        let blockLines = [header, block.filename];
                        
                        if (block.type === 'loopsound') {
                            blockLines.push(block.sampleRate, block.loopVariable, block.varValue, block.volume);
                            
                            if (block.noloop === 'yes') {
                                blockLines.push('[noloop]');
                            }
                        } else {
                            blockLines.push(block.volume);
                            
                            // Always add the trigger if it exists, regardless of conditions
                            if (block.trigger) {
                                blockLines.push('[trigger]', block.trigger);
                            }
                        }

                        if (block.conditions && block.conditions.length > 0 && !(block.type === 'sound' && block.trigger)) {
                            block.conditions.forEach(cond => {
                                if (cond.varName) {
                                    blockLines.push('[conditionSingle]', cond.varName, cond.varVal, cond.conditionType);
                                }
                            });
                        }

                        blockLines.push('[viewpoint]', block.viewpoint);
                        
                        const s3d = (block.spatial3d || "0 0 0 0").split(/\s+/);
                        blockLines.push('[3d]', s3d[0]||'0', s3d[1]||'0', s3d[2]||'0', s3d[3]||'0');

                        if (block.curves && block.curves.length > 0) {
                            block.curves.forEach(curve => {
                                blockLines.push('[volcurve]', curve.variable);
                                curve.points.forEach(pnt => {
                                    blockLines.push('[pnt]', pnt.x.toString(), pnt.y.toString());
                                });
                            });
                        }

                        return blockLines.join('\n');
                    }).join('\n\n');

                    const blob = new Blob([outputText], { type: 'text/plain;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = 'sound_edited.cfg';
                    link.click();
                    URL.revokeObjectURL(url);
                };

                return {
                    blocks,
                    findText,
                    replaceText,
                    isDraggingFile,
                    isAllCollapsed,
                    handleFileUpload,
                    handleFileDrop,
                    handleDragStart,
                    handleDragEnter,
                    handleDrop,
                    duplicateBlock,
                    deleteBlock,
                    addCondition,
                    removeCondition,
                    addCurvePoint,
                    removeCurvePoint,
                    toggleAllCollapsed,
                    massReplace,
                    exportFile,
                    getVisualPoints,
                    getSvgPath
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
