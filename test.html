<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMSI Config Editor</title>
    <!-- Tailwind CSS for quick styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Vue 3 for reactive state management -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-gray-100 text-gray-950 p-6">

    <div id="app" class="max-w-5xl mx-auto">
        <header class="mb-6">
            <h1 class="text-2xl font-bold">OMSI Config Editor</h1>
            <p class="text-sm text-gray-600">Upload, reorder, and mass-edit configuration blocks.</p>
        </header>

        <!-- Main Workspace -->
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
            <input type="file" @change="handleFileUpload" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            
            <div class="mt-6">
                <p class="text-gray-500 italic">Loaded blocks will appear here...</p>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const blocks = ref([]);

                const handleFileUpload = (event) => {
                    const file = event.target.files[0];
                    if (!file) return;

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const text = e.target.result;
                        // Your parsing logic will go here
                        console.log("File loaded successfully");
                    };
                    reader.readAsText(file);
                };

                return {
                    blocks,
                    handleFileUpload
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
